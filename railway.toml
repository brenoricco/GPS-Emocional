[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile=false && pnpm db:sincronizar-prod && pnpm db:gerar:prod && pnpm db:push:prod && pnpm tsx prisma/seed.ts && NEXT_OUTPUT=standalone pnpm build"

[deploy]
startCommand = "pnpm start"
healthcheckPath = "/api/saude"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
PRISMA_SCHEMA = "prisma/schema.production.prisma"
